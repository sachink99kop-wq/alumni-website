<svg viewBox="0 0 1600 450" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15293f"/><stop offset="1" stop-color="#1E3A5F"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="450" fill="url(#g)"/>
  <!-- skyline / campus silhouette -->
  <g fill="#F5A623" opacity="0.12">
    <rect x="0" y="330" width="1600" height="120"/>
    <rect x="120" y="250" width="90" height="120"/><rect x="230" y="210" width="70" height="160"/>
    <rect x="1280" y="240" width="100" height="130"/><rect x="1400" y="200" width="80" height="170"/>
  </g>
  <!-- graduation caps scattered -->
  <g fill="#F5A623" opacity="0.18">
    <g transform="translate(1180,110)"><polygon points="0,20 60,0 120,20 60,40"/><rect x="55" y="36" width="10" height="34"/><circle cx="60" cy="74" r="6"/></g>
    <g transform="translate(1340,210) scale(0.7)"><polygon points="0,20 60,0 120,20 60,40"/><rect x="55" y="36" width="10" height="34"/><circle cx="60" cy="74" r="6"/></g>
  </g>
  <!-- network dots -->
  <g stroke="#F7B84B" stroke-width="2" opacity="0.25">
    <line x1="200" y1="120" x2="340" y2="180"/><line x1="340" y1="180" x2="280" y2="300"/><line x1="340" y1="180" x2="470" y2="140"/>
  </g>
  <g fill="#F7B84B" opacity="0.5">
    <circle cx="200" cy="120" r="7"/><circle cx="340" cy="180" r="9"/><circle cx="280" cy="300" r="7"/><circle cx="470" cy="140" r="6"/>
  </g>
</svg>
