<svg viewBox="0 0 1600 450" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15293f"/><stop offset="1" stop-color="#1E3A5F"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="450" fill="url(#g)"/>
  <!-- chevron rank insignia, repeated faintly -->
  <g fill="none" stroke="#F5A623" stroke-width="6" opacity="0.10">
    <path d="M120 180 L180 140 L240 180"/><path d="M120 220 L180 180 L240 220"/><path d="M120 260 L180 220 L240 260"/>
    <path d="M1360 180 L1420 140 L1480 180"/><path d="M1360 220 L1420 180 L1480 220"/><path d="M1360 260 L1420 220 L1480 260"/>
  </g>
  <!-- crossed swords + star crest (centre-right) -->
  <g opacity="0.16" stroke="#F7B84B" stroke-width="5" fill="none">
    <line x1="1180" y1="120" x2="1320" y2="320"/><line x1="1320" y1="120" x2="1180" y2="320"/>
    <polygon points="1180,120 1166,110 1176,128" fill="#F7B84B" stroke="none"/>
    <polygon points="1320,120 1334,110 1324,128" fill="#F7B84B" stroke="none"/>
  </g>
  <!-- five-point star -->
  <g transform="translate(1250,210)" opacity="0.22" fill="#F5A623">
    <polygon points="0,-46 13,-14 47,-14 19,7 30,40 0,20 -30,40 -19,7 -47,-14 -13,-14"/>
  </g>
  <!-- parade silhouette baseline -->
  <g fill="#F5A623" opacity="0.10">
    <rect x="0" y="400" width="1600" height="50"/>
    <circle cx="300" cy="395" r="9"/><circle cx="340" cy="395" r="9"/><circle cx="380" cy="395" r="9"/><circle cx="420" cy="395" r="9"/>
    <circle cx="460" cy="395" r="9"/><circle cx="500" cy="395" r="9"/><circle cx="540" cy="395" r="9"/>
  </g>
</svg>
