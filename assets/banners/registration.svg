<svg viewBox="0 0 1600 450" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15293f"/><stop offset="1" stop-color="#1E3A5F"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="450" fill="url(#g)"/>
  <!-- cadet ID / service card -->
  <g opacity="0.2">
    <rect x="1240" y="140" width="260" height="170" rx="16" fill="#F5A623"/>
    <circle cx="1300" cy="200" r="30" fill="#1E3A5F"/>
    <g transform="translate(1300,200)" fill="#F5A623"><polygon points="0,-16 5,-5 16,-5 8,3 11,14 0,7 -11,14 -8,3 -16,-5 -5,-5"/></g>
    <rect x="1350" y="180" width="120" height="14" rx="7" fill="#1E3A5F"/>
    <rect x="1350" y="206" width="90" height="12" rx="6" fill="#1E3A5F"/>
    <rect x="1270" y="255" width="200" height="12" rx="6" fill="#1E3A5F"/>
    <rect x="1270" y="278" width="150" height="12" rx="6" fill="#1E3A5F"/>
  </g>
  <!-- enlistment form with check steps -->
  <g opacity="0.3">
    <rect x="200" y="130" width="240" height="200" rx="12" fill="none" stroke="#F7B84B" stroke-width="3"/>
    <circle cx="235" cy="175" r="12" fill="#F7B84B"/><rect x="260" y="168" width="150" height="14" rx="7" fill="#F7B84B"/>
    <circle cx="235" cy="220" r="12" fill="#F7B84B"/><rect x="260" y="213" width="150" height="14" rx="7" fill="#F7B84B"/>
    <circle cx="235" cy="265" r="12" fill="none" stroke="#F7B84B" stroke-width="3"/><rect x="260" y="258" width="120" height="14" rx="7" fill="none" stroke="#F7B84B" stroke-width="2"/>
  </g>
</svg>
