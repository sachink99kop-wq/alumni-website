<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShivMaya State College Alumni — Contact</title>
  <meta name="description" content="Get in touch with the alumni association." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { navy: { DEFAULT: '#1E3A5F', light: '#2c5282', dark: '#15293f' }, amber: { 400: '#F7B84B', 500: '#F5A623', 600: '#d98e0f' }, lightgray: '#F8F9FA' },
        fontFamily: { display: ['"Playfair Display"', 'serif'], sans: ['Inter', 'system-ui', 'sans-serif'] },
      } },
    }
  </script>
  <style>
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; }
    .font-display { font-family: 'Playfair Display', serif; }
    .fade-in { opacity: 0; transform: translateY(24px); transition: opacity .6s ease, transform .6s ease; }
    .fade-in.visible { opacity: 1; transform: none; }
    .bg-navy { background-color: #1E3A5F; }
    .text-navy { color: #1E3A5F; }
  </style>
</head>
<body class="bg-white text-gray-800">
  <div id="site-header"></div>

  <section class="relative bg-navy text-white py-16 overflow-hidden">
    <div class="absolute inset-0 bg-cover bg-center" style="background-image:url('assets/banners/contact.svg')"></div>
    <div class="absolute inset-0 bg-navy/55"></div>
    <div class="relative max-w-7xl mx-auto px-4 text-center">
      <h1 class="font-display text-4xl font-bold mb-3">Contact Us</h1>
      <p class="text-gray-200">We'd love to hear from you. Reach out any time.</p>
    </div>
  </section>

  <section class="py-16 bg-lightgray">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 grid gap-10 lg:grid-cols-3">
      <!-- Info cards -->
      <div class="space-y-5">
        <div class="bg-white rounded-2xl shadow-sm p-6 fade-in">
          <h3 class="font-display text-lg font-bold text-navy mb-1">📍 Address</h3>
          <p class="text-gray-600 text-sm">Alumni Relations Office,<br/>123 University Avenue,<br/>Belgaum, Karnataka 590008, India</p>
        </div>
        <div class="bg-white rounded-2xl shadow-sm p-6 fade-in">
          <h3 class="font-display text-lg font-bold text-navy mb-1">📞 Phone</h3>
          <p class="text-gray-600 text-sm">+91 98765 43210</p>
        </div>
        <div class="bg-white rounded-2xl shadow-sm p-6 fade-in">
          <h3 class="font-display text-lg font-bold text-navy mb-1">✉️ Email</h3>
          <p class="text-gray-600 text-sm">alumni@shivmayastatescollege.edu<br/>support@shivmayastatescollege.edu</p>
        </div>
        <div class="bg-white rounded-2xl shadow-sm p-6 fade-in">
          <h3 class="font-display text-lg font-bold text-navy mb-3">Follow Us</h3>
          <div class="flex gap-3">
            <a href="#" class="h-9 w-9 grid place-items-center rounded-full bg-navy text-white hover:bg-amber-500 hover:text-navy transition-colors">f</a>
            <a href="#" class="h-9 w-9 grid place-items-center rounded-full bg-navy text-white hover:bg-amber-500 hover:text-navy transition-colors">in</a>
            <a href="#" class="h-9 w-9 grid place-items-center rounded-full bg-navy text-white hover:bg-amber-500 hover:text-navy transition-colors">ig</a>
            <a href="#" class="h-9 w-9 grid place-items-center rounded-full bg-navy text-white hover:bg-amber-500 hover:text-navy transition-colors">x</a>
          </div>
        </div>
      </div>

      <!-- Form -->
      <div class="lg:col-span-2">
        <form id="contactForm" class="bg-white rounded-2xl shadow-sm p-6 sm:p-8 space-y-5 fade-in" novalidate>
          <h2 class="font-display text-2xl font-bold text-navy">Send a Message</h2>
          <div class="grid gap-5 sm:grid-cols-2">
            <div>
              <label class="block text-sm font-medium mb-1">Name *</label>
              <input name="name" type="text" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-500/30" />
              <p class="err text-xs text-red-600 mt-1 hidden"></p>
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Email *</label>
              <input name="email" type="email" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-500/30" />
              <p class="err text-xs text-red-600 mt-1 hidden"></p>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Subject</label>
            <input name="subject" type="text" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-500/30" />
            <p class="err text-xs text-red-600 mt-1 hidden"></p>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Message *</label>
            <textarea name="message" rows="5" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-500/30"></textarea>
            <p class="err text-xs text-red-600 mt-1 hidden"></p>
          </div>
          <button type="submit" id="contactBtn" class="px-8 py-3 rounded-full bg-amber-500 text-navy font-semibold hover:bg-amber-400 transition-colors inline-flex items-center gap-2">Send Message</button>
        </form>

        <!-- Map -->
        <div class="mt-8 rounded-2xl overflow-hidden shadow-sm fade-in">
          <iframe title="Map" class="w-full h-72 border-0"
            src="https://www.google.com/maps?q=Belgaum,Karnataka,India&output=embed" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script src="js/common.js"></script>
  <script type="module" src="js/contact.js"></script>
</body>
</html>
