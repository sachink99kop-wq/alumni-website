<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin — Sainik Military School Alumni</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { navy: { DEFAULT: '#1E3A5F', light: '#2c5282', dark: '#15293f' }, amber: { 400: '#F7B84B', 500: '#F5A623', 600: '#d98e0f' }, lightgray: '#F8F9FA' },
        fontFamily: { display: ['"Oswald"', 'serif'], sans: ['Inter', 'system-ui', 'sans-serif'] },
      } },
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-display { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: .04em; }
    .bg-navy { background-color: #1E3A5F; }
    .text-navy { color: #1E3A5F; }
    .inp { width:100%; padding:.6rem .9rem; border:1px solid #d1d5db; border-radius:.6rem; outline:none; transition:border-color .15s, box-shadow .15s; background:#fff; }
    .inp:focus { border-color:#F5A623; box-shadow:0 0 0 3px rgba(245,166,35,.25); }
  </style>
</head>
<body class="bg-lightgray text-gray-800 min-h-screen">

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="hidden min-h-screen grid place-items-center px-4">
    <form id="loginForm" class="bg-white rounded-2xl shadow-md w-full max-w-sm p-8" novalidate>
      <div class="flex items-center gap-2 mb-6 justify-center">
        <span class="inline-flex items-center justify-center h-10 w-10 rounded-full bg-amber-500 text-navy font-bold font-display">S</span>
        <span class="font-display text-lg font-bold text-navy">Admin Panel</span>
      </div>
      <h1 class="font-display text-xl font-bold text-navy mb-1 text-center">Sign in</h1>
      <p class="text-gray-500 text-sm mb-6 text-center">Authorised staff only.</p>
      <label class="block text-sm font-medium mb-1">Email</label>
      <input name="email" type="email" class="inp mb-4" autocomplete="username" />
      <label class="block text-sm font-medium mb-1">Password</label>
      <input name="password" type="password" class="inp mb-2" autocomplete="current-password" />
      <p id="loginError" class="text-sm text-red-600 mb-4 hidden"></p>
      <button type="submit" id="loginBtn" class="w-full mt-2 py-3 rounded-full bg-navy text-white font-semibold hover:bg-navy-light transition-colors inline-flex items-center justify-center gap-2">Sign in</button>
      <a href="index.html" class="block text-center text-sm text-gray-500 hover:text-navy mt-4">← Back to website</a>
    </form>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden">
    <header class="bg-navy text-white sticky top-0 z-40">
      <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="inline-flex items-center justify-center h-9 w-9 rounded-full bg-amber-500 text-navy font-bold font-display">S</span>
          <span class="font-display font-bold">Alumni Admin</span>
        </div>
        <div class="flex items-center gap-4">
          <a href="index.html" class="text-sm text-gray-200 hover:text-amber-400">View site</a>
          <span id="whoami" class="text-xs text-gray-300 hidden sm:inline"></span>
          <button id="logoutBtn" class="px-4 py-2 rounded-full bg-white/10 hover:bg-amber-500 hover:text-navy text-sm font-medium transition-colors">Sign out</button>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-10 grid gap-10 lg:grid-cols-2">

      <!-- ADD GALLERY IMAGE -->
      <section class="bg-white rounded-2xl shadow-sm p-6 sm:p-8">
        <h2 class="font-display text-2xl font-bold text-navy mb-5">Add Gallery Photo</h2>
        <form id="galleryForm" class="space-y-4" novalidate>
          <div>
            <label class="block text-sm font-medium mb-1">Title</label>
            <input name="title" type="text" class="inp" placeholder="e.g. Reunion 2024" />
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Category *</label>
            <select name="category" class="inp">
              <option value="parade">Parade</option>
              <option value="training">Training</option>
              <option value="reunion">Reunion</option>
              <option value="sports">Sports</option>
              <option value="cultural">Cultural</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Photo *</label>
            <input name="file" type="file" accept="image/*" class="inp py-2" />
            <p class="err text-xs text-red-600 mt-1 hidden"></p>
          </div>
          <button type="submit" id="galleryBtn" class="px-6 py-3 rounded-full bg-amber-500 text-navy font-semibold hover:bg-amber-400 transition-colors inline-flex items-center gap-2">Upload to Gallery</button>
        </form>

        <h3 class="font-semibold text-navy mt-8 mb-3 text-sm uppercase tracking-wide">Existing photos</h3>
        <div id="galleryList" class="grid grid-cols-3 gap-3"></div>
      </section>

      <!-- ADD EVENT -->
      <section class="bg-white rounded-2xl shadow-sm p-6 sm:p-8">
        <h2 class="font-display text-2xl font-bold text-navy mb-5">Add Event</h2>
        <form id="eventForm" class="space-y-4" novalidate>
          <div>
            <label class="block text-sm font-medium mb-1">Title *</label>
            <input name="title" type="text" class="inp" />
            <p class="err text-xs text-red-600 mt-1 hidden"></p>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Description</label>
            <textarea name="description" rows="3" class="inp"></textarea>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium mb-1">Date</label>
              <input name="event_date" type="date" class="inp" />
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Time</label>
              <input name="event_time" type="time" class="inp" />
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Location</label>
            <input name="location" type="text" class="inp" />
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Cover Photo (optional)</label>
            <input name="file" type="file" accept="image/*" class="inp py-2" />
          </div>
          <label class="flex items-center gap-2 text-sm">
            <input name="is_featured" type="checkbox" class="h-4 w-4 accent-amber-500" /> Mark as featured
          </label>
          <button type="submit" id="eventBtn" class="px-6 py-3 rounded-full bg-amber-500 text-navy font-semibold hover:bg-amber-400 transition-colors inline-flex items-center gap-2">Publish Event</button>
        </form>

        <h3 class="font-semibold text-navy mt-8 mb-3 text-sm uppercase tracking-wide">Existing events</h3>
        <div id="eventList" class="space-y-2"></div>
      </section>

      <!-- REPORTS -->
      <section class="bg-white rounded-2xl shadow-sm p-6 sm:p-8 lg:col-span-2">
        <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
          <h2 class="font-display text-2xl font-bold text-navy">Reports</h2>
          <div class="flex items-center gap-2">
            <span id="reportCount" class="text-sm text-gray-500"></span>
            <button id="reportRefresh" class="px-3 py-2 rounded-full bg-lightgray hover:bg-gray-200 text-navy text-sm font-medium transition-colors">Refresh</button>
            <button id="reportExport" class="px-4 py-2 rounded-full bg-navy text-white text-sm font-semibold hover:bg-navy-light transition-colors inline-flex items-center gap-1.5">
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1M12 12V4m0 8l-4-4m4 4l4-4"/></svg>
              Export CSV
            </button>
          </div>
        </div>

        <!-- Report tabs -->
        <div id="reportTabs" class="flex flex-wrap gap-2 mb-5">
          <button class="report-tab px-4 py-2 rounded-full text-sm font-semibold bg-amber-500 text-navy" data-table="alumni_registrations" data-label="Registrations">Registrations</button>
          <button class="report-tab px-4 py-2 rounded-full text-sm font-semibold bg-lightgray text-navy" data-table="donations" data-label="Donations">Donations</button>
          <button class="report-tab px-4 py-2 rounded-full text-sm font-semibold bg-lightgray text-navy" data-table="contact_messages" data-label="Contact Messages">Contact Messages</button>
          <button class="report-tab px-4 py-2 rounded-full text-sm font-semibold bg-lightgray text-navy" data-table="event_registrations" data-label="Event Signups">Event Signups</button>
          <button class="report-tab px-4 py-2 rounded-full text-sm font-semibold bg-lightgray text-navy" data-table="newsletter_subscribers" data-label="Newsletter">Newsletter</button>
        </div>

        <div class="overflow-x-auto border border-gray-100 rounded-xl">
          <div id="reportTable" class="min-w-full"></div>
        </div>
      </section>
    </main>
  </div>

  <!-- Boot loader -->
  <div id="bootLoader" class="min-h-screen grid place-items-center">
    <svg class="animate-spin h-8 w-8 text-amber-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.4 0 0 5.4 0 12h4z"></path>
    </svg>
  </div>

  <script src="js/common.js"></script>
  <script type="module" src="js/admin.js"></script>
</body>
</html>
